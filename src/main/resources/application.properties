spring.application.name=backend

# Render injects PORT — Spring Boot must bind to it
server.port=${PORT:8080}

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/neondb}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:password}

# Dialect auto-detected by Hibernate — no need to specify
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=0
spring.datasource.hikari.max-lifetime=300000
spring.datasource.hikari.idle-timeout=180000
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.keepalive-time=60000

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# Suppress security password log (we use our own UserDetailsService)
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration

logging.level.root=WARN
logging.level.com.example.backend=INFO
logging.level.com.zaxxer.hikari=WARN
logging.level.org.hibernate=WARN
logging.level.org.springframework=WARN
logging.level.org.springframework.web=WARN

application.security.jwt.secret-key=${JWT_SECRET:placeholder_jwt_secret_key_change_me_in_production_1234567890}
application.security.jwt.expiration=${JWT_EXPIRATION:86400000}

resend.api-key=${RESEND_API_KEY:placeholder_resend_api_key}
resend.from-email=${RESEND_FROM_EMAIL:support@example.com}

aws.access-key-id=${AWS_ACCESS_KEY_ID:placeholder_aws_key_id}
aws.secret-access-key=${AWS_SECRET_ACCESS_KEY:placeholder_aws_secret_key}
aws.region=${AWS_REGION:eu-west-1}
aws.s3.bucket-name=${AWS_S3_BUCKET_NAME:placeholder_s3_bucket}

jitsi.app-id=${JITSI_APP_ID:placeholder_jitsi_app_id}
jitsi.app-secret=${JITSI_APP_SECRET:placeholder_jitsi_app_secret}
jitsi.server-url=${JITSI_SERVER_URL:https://meet.jit.si}

# Dojah API Verification
dojah.app-id=${DOJAH_APP_ID:placeholder_dojah_app_id}
dojah.api-key=${DOJAH_API_KEY:placeholder_dojah_api_key}
dojah.base-url=${DOJAH_BASE_URL:https://sandbox.dojah.io}

